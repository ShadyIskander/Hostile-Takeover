<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commanders</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C18;
  --bg2:#0D1220;
  --bg3:#111827;
  --card:#0A0F1E;
  --card2:#0E1525;
  --primary:#3B82F6;
  --secondary:#60A5FA;
  --green:#34D399;
  --green2:#6EE7B7;
  --text:#F1F5F9;
  --text2:#CBD5E1;
  --text3:#94A3B8;
  --muted:#475569;
  --border:rgba(148,163,184,0.08);
  --border2:rgba(148,163,184,0.14);
  --tank:#94A3B8;
  --navy:#7DD3FC;
  --air:#C9A84C;
  --gold:#FBBF24;
  --red:#F87171;
  --wealth-text:#34D399;
  --capital-text:#93C5FD;
  --bonus-text:#34D399;
}

html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── BACKGROUND ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(160px);opacity:.08;animation:orbF linear infinite}
.o1{width:700px;height:700px;background:#1E3A8A;top:-250px;left:-100px;animation-duration:28s}
.o2{width:600px;height:600px;background:#1E40AF;top:20%;right:-180px;animation-duration:35s;animation-direction:reverse}
.o3{width:500px;height:500px;background:#064E3B;bottom:-120px;left:25%;animation-duration:22s}
.o4{width:400px;height:400px;background:#1D4ED8;top:50%;left:10%;animation-duration:30s;opacity:.05}
.o5{width:300px;height:300px;background:#065F46;bottom:10%;right:15%;animation-duration:18s;animation-direction:reverse;opacity:.07}
@keyframes orbF{0%{transform:translate(0,0)scale(1)}33%{transform:translate(50px,-35px)scale(1.08)}66%{transform:translate(-25px,45px)scale(.93)}100%{transform:translate(0,0)scale(1)}}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(148,163,184,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.03) 1px,transparent 1px);background-size:48px 48px}
.scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}
.beam{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.12),transparent);animation:beam 12s linear infinite}
@keyframes beam{0%{top:-2px}100%{top:100vh}}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
header{padding:0 16px;height:62px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);background:rgba(8,12,24,.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;gap:10px}
.logo{font-family:'Bebas Neue',cursive;font-size:clamp(18px,4vw,30px);letter-spacing:.1em;background:linear-gradient(90deg,#3B82F6,#818CF8,#34D399,#818CF8,#3B82F6);background-size:400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:ls 8s linear infinite;white-space:nowrap}
@keyframes ls{0%{background-position:0%}100%{background-position:400%}}
.hdr-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);border-radius:20px;padding:4px 10px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#34D399;letter-spacing:.1em}
.ldot{width:6px;height:6px;border-radius:50%;background:#34D399;animation:lp 1.3s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.3}}
.sync{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.06em;display:none}
@media(min-width:500px){.sync{display:block}}
.cdown{position:relative;width:26px;height:26px;flex-shrink:0}
.cdown-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--secondary)}

/* ── LEGEND ── */
.legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:6px 12px;background:rgba(8,12,24,.8);border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.08em}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* ── TICKER ── */
.ticker{background:rgba(8,12,24,.98);border-bottom:1px solid var(--border2);height:28px;display:flex;align-items:center;overflow:hidden;flex-shrink:0}
.ttrack{display:flex;gap:50px;white-space:nowrap;animation:tick 30s linear infinite;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.1em}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{color:var(--text3)}.ti .lb{margin-right:5px}.ti .vl{font-weight:700}
.tup{color:#34D399}.tdn{color:#F87171}.tfl{color:var(--muted)}

/* ── MAIN ── */
main{flex:1;padding:12px}
@media(min-width:900px){main{padding:16px 24px;max-width:1800px;margin:0 auto}}

.slbl{font-family:'Inter',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.slbl::before,.slbl::after{content:'';flex:1;height:1px;background:var(--border2)}
.slbl::before{flex:0 0 16px}

/* ── INFO CARDS ── */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
@media(min-width:700px){.info-grid{grid-template-columns:repeat(9,1fr)}}

.icard{border-radius:9px;padding:10px 8px;position:relative;overflow:hidden;border:1px solid var(--border2);background:var(--card2);backdrop-filter:blur(8px);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.icard::before{content:'';position:absolute;inset:0;opacity:.05;background:var(--ic)}
.icard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ic)}
.icard.tank1,.icard.tank2,.icard.tank3{--ic:#94A3B8}
.icard.navy1,.icard.navy2,.icard.navy3{--ic:#7DD3FC}
.icard.air1,.icard.air2,.icard.air3{--ic:#C9A84C}

.icard-emoji{font-size:16px;line-height:1}
.icard-label{font-family:'Inter',sans-serif;font-weight:700;font-size:11px;color:#F1F5F9;letter-spacing:.03em;text-transform:uppercase;line-height:1.3;text-align:center;max-width:50px;margin-bottom:4px;}
/* EDIT 1: icard-val now uses bold white #F1F5F9 instead of --ic color */
.icard-val{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3vw,26px);color:var(--ic);line-height:1}
.icard-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#F1F5F9;letter-spacing:.08em;font-weight:700}

.icard.navy1{border-top:2px solid rgba(129,140,248,.3)}
.icard.air1{border-top:2px solid rgba(52,211,153,.3)}
@media(min-width:700px){
  .icard.navy1,.icard.air1{border-top:1px solid var(--border2)}
  .icard.navy1{border-left:1px solid rgba(129,140,248,.3)}
  .icard.air1{border-left:1px solid rgba(52,211,153,.3)}
}

/* ── TEAM GRID ── */
.tgrid{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:460px){.tgrid{grid-template-columns:1fr 1fr}}
@media(min-width:760px){.tgrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1060px){.tgrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1360px){.tgrid{grid-template-columns:repeat(5,1fr)}}

.tcard{border-radius:12px;border:1px solid var(--border2);background:var(--card);backdrop-filter:blur(10px);overflow:hidden;position:relative;animation:riseIn .45s cubic-bezier(.22,1,.36,1) both;transition:transform .2s,box-shadow .2s}
.tcard:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes riseIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.tcard.r1{border-color:rgba(148,163,184,.35);box-shadow:0 0 0 1px rgba(148,163,184,.15),0 0 28px rgba(148,163,184,.04)}
.tcard.r2{border-color:rgba(203,213,225,.2)}
.tcard.r3{border-color:rgba(96,165,250,.3)}
.stripe{position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--tc)}

/* ── CARD HEADER ── */
.chead{padding:10px 12px 8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(0,0,0,.25);gap:8px}
/* EDIT 2: crank slightly larger — 16px base, 18px for gold */
.crank{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--text3);letter-spacing:.12em;line-height:1;margin-bottom:2px}
.crank.gold{color:#FBBF24;font-size:16px}
.cname{font-family:'Inter',sans-serif;font-weight:700;font-size:clamp(16px,2.5vw,22px);letter-spacing:.02em;color:var(--tc);line-height:1.2;word-break:break-word}

.score-val{font-family:'Bebas Neue',cursive;font-size:clamp(28px,3.5vw,40px);color:#F1F5F9;line-height:1}
.score-box{text-align:right;flex-shrink:0}
.score-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.15em;margin-bottom:1px}
.score-unit{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);margin-left:2px}

/* ── CARD BODY ── */
.cbody{padding:10px 12px 12px 16px}

/* ── WEALTH SECTION ── */
.wealth-section{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.18);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.wealth-top{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:2px;gap:2px}
.wealth-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#34D399;letter-spacing:.15em}
.wealth-val{font-family:'Bebas Neue',cursive;font-size:30px;color:#34D399;line-height:1}
.wealth-unit{font-family:'Share Tech Mono',monospace;font-size:9px;color:#059669;margin-left:3px}
.wealth-bar{height:3px;background:rgba(52,211,153,.12);border-radius:2px;overflow:hidden;margin:8px 0}
.wealth-fill{height:100%;background:linear-gradient(90deg,#059669,#34D399);border-radius:2px}

.wealth-breakdown{display:flex;flex-direction:column;gap:3px}
.wb-row{display:flex;justify-content:space-between;align-items:center;font-family:'Share Tech Mono',monospace;font-size:14px;padding:5px 0}
.wb-lbl{color:#CBD5E1;font-weight:500}
.wb-num{color:#F1F5F9;font-weight:700;font-size:14px}
.wb-divider{height:1px;background:rgba(148,163,184,.1);margin:4px 0}
.wb-row.wb-total{padding-top:8px;margin-top:4px;flex-direction:column;align-items:flex-start;gap:2px}
.wb-row.wb-total .wb-num{color:#34D399;font-family:'Bebas Neue',cursive;font-size:22px}

/* ── STOCK ROWS ── */
.stock-row{display:flex;justify-content:space-between;align-items:center;font-family:'Share Tech Mono',monospace;font-size:14px;padding:4px 0}
.sr-val{color:#F1F5F9;min-width:30px;text-align:right;font-weight:700}

/* ── BONUS ROW ── */
.bonus-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:6px 10px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:7px}
.bonus-lbl{font-family:'Share Tech Mono',monospace;font-size:16px;color:#34D399;letter-spacing:.12em;font-weight:700}
.bonus-val{font-family:'Bebas Neue',cursive;font-size:28px;color:#34D399}

/* ── VEHICLES ── */
.vlbl{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:.15em;margin-bottom:6px}
.vrow{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

.vtile{background:rgba(255,255,255,.02);border:1px solid rgba(148,163,184,.12);border-radius:8px;padding:10px 4px;text-align:center;position:relative;overflow:hidden}
.vtile::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--vc)}
.vtile.vtank{--vc:#94A3B8}.vtile.vnavy{--vc:#7DD3FC}.vtile.vair{--vc:#C9A84C}
.vtile.wiped{opacity:.2;filter:grayscale(1)}
.vemo{font-size:22px;line-height:1;margin-bottom:3px}
/* EDIT 3: vtag larger — 13px up from 9px */
.vtag{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--vc);letter-spacing:.08em;margin-bottom:3px;font-weight:700}
.valive{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--vc);line-height:1}

/* ── LOADER / ERROR ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px}
.lring{width:44px;height:44px;border:2px solid rgba(148,163,184,.1);border-top-color:#3B82F6;border-right-color:#34D399;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--text3);animation:blk 1.5s ease-in-out infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.25}}
.errbox{margin:24px auto;max-width:420px;text-align:center;background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:24px}
.errm{font-family:'Share Tech Mono',monospace;font-size:10px;color:#FCA5A5;margin-top:8px;line-height:1.6}

footer{text-align:center;padding:12px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.12em;border-top:1px solid var(--border);background:rgba(8,12,24,.95)}
</style>
</head>
<body>
<div class="bg">
  <div class="grid-bg"></div>
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="orb o3"></div><div class="orb o4"></div><div class="orb o5"></div>
  <div class="scanlines"></div><div class="beam"></div>
</div>
<div class="app">
  <header>
    <div class="logo">⚔ Commanders</div>
    <div class="hdr-r">
      <div class="live-badge"><div class="ldot"></div>LIVE</div>
      <div class="sync" id="syncTxt">—</div>
      <div class="cdown" title="Refreshes every 5s">
        <svg width="26" height="26" viewBox="0 0 26 26" style="transform:rotate(-90deg)">
          <circle cx="13" cy="13" r="10" fill="none" stroke="rgba(148,163,184,0.1)" stroke-width="2"/>
          <circle id="cring" cx="13" cy="13" r="10" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="62.8" stroke-dashoffset="0"/>
        </svg>
        <span class="cdown-txt" id="ctxt">5</span>
      </div>
    </div>
  </header>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#F1F5F9"></div><span style="color:#CBD5E1">SCORE — ranking</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#34D399"></div><span style="color:#34D399">TOTAL WEALTH — liquid + stocks</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#93C5FD"></div><span style="color:#93C5FD">CAPITAL — liquid only</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:#34D399"></div><span style="color:#34D399">BONUS — battle rewards</span></div>
  </div>

  <div class="ticker"><div class="ttrack" id="ttrack">
    <span class="ti"><span class="lb" style="color:#475569">⬥ LOADING DATA...</span></span>
    <span class="ti"><span class="lb" style="color:#475569">⬥ LOADING DATA...</span></span>
  </div></div>

  <main id="mainArea">
    <div class="loader" id="loader"><div class="lring"></div><div class="ltxt">LOADING BATTLE DATA...</div></div>
  </main>
  <footer id="ft">◈ AUTO-REFRESH EVERY 5s ◈ RANKED BY SCORE POINTS ◈</footer>
</div>

<script>
const SHEET_ID = '1A23UY1LWW8KSCT0VVhZjj8QJXVjeR4h27LvdWkzYwVE';

const COLORS=[
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
  {h:'#F1F5F9',r:'241,245,249'},
];

const VC={
  Tanks:    {e:'🪖', t:'TANK', c:'vtank', destroyedKey:'TanksDestroyed'},
  NavySeals:{e:'⚓', t:'NAVY', c:'vnavy', destroyedKey:'NavyDestroyed'},
  AirForce: {e:'✈',  t:'AIR',  c:'vair',  destroyedKey:'AirDestroyed'},
};

let hist={TANK:[],NAVY:[],AIR:[]};
let countdown=5;

function startCountdown(){
  setInterval(()=>{
    countdown--;
    if(countdown<=0){countdown=5;go();}
    tickCD();
  },1000);
  tickCD();
}
function tickCD(){
  const ring=document.getElementById('cring');
  const txt=document.getElementById('ctxt');
  if(ring){ring.style.strokeDashoffset=62.8-(62.8*(countdown/5));ring.style.stroke=countdown>2?'#3B82F6':'#34D399';}
  if(txt)txt.textContent=countdown;
}

async function fetchTab(tab){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}&t=${Date.now()}&r=${Math.random().toString(36).slice(2)}`;
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok)throw new Error(`HTTP ${r.status} on tab "${tab}"`);
  const txt=await r.text();
  const j=JSON.parse(txt.substring(txt.indexOf('{'),txt.lastIndexOf('}')+1));
  const cols=j.table.cols.map(c=>c.label||c.id);
  return(j.table.rows||[]).map(row=>{
    const o={};row.c.forEach((cell,i)=>{o[cols[i]]=cell?(cell.v??''):'';});return o;
  });
}

async function go(){
  try{
    const[tRows,sRows,pRows]=await Promise.all([fetchTab('Teams'),fetchTab('Stocks'),fetchTab('Prices')]);
    render(tRows,sRows,pRows);
    document.getElementById('syncTxt').textContent='SYNCED '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){showErr(e.message);}
}

function render(tRows,sRows,pRows){
  document.getElementById('loader').style.display='none';

  const sm={};
  sRows.forEach(r=>{const k=(r['Department']||'').toUpperCase().trim();sm[k]={price:parseFloat(r['Price'])||0,change:parseFloat(r['Change'])||0};});

  const pm={};
  pRows.forEach(r=>{const v=(r['Vehicle']||'').trim();pm[v]={price:parseFloat(r['Price'])||0,points:parseFloat(r['Points'])||0};});

  ['TANK','NAVY','AIR'].forEach(k=>{const p=sm[k]?.price||0;if(p){hist[k].push(p);if(hist[k].length>24)hist[k].shift();}});

  const teams=tRows.filter(r=>r['TeamName']).map(team=>{
    let vs=0;
    Object.entries(VC).forEach(([vk,vc])=>{
      const owned=parseInt(team[vk])||0;
      const dead=parseInt(team[vc.destroyedKey])||0;
      const alive=Math.max(0,owned-dead);
      vs+=alive*(pm[vk]?.points||0);
    });
    const bonus=parseFloat(team['BonusPoints'])||0;
    const liquid=parseFloat(team['Capital'])||0;
    const tankS=parseInt(team['TankStocks'])||0;
    const navyS=parseInt(team['NavyStocks'])||0;
    const airS=parseInt(team['AirStocks'])||0;
    const stockVal=(tankS*(sm['TANK']?.price||0))+(navyS*(sm['NAVY']?.price||0))+(airS*(sm['AIR']?.price||0));
    return{...team,_score:vs+bonus,_vs:vs,_bonus:bonus,_liquid:liquid,_tankS:tankS,_navyS:navyS,_airS:airS,_stockVal:stockVal,_wealth:liquid+stockVal};
  });
  teams.sort((a,b)=>b._score-a._score);

  document.getElementById('mainArea').innerHTML=buildAll(teams,sm,pm);
  updTicker(teams,sm);
  document.getElementById('ft').textContent=`◈ LAST SYNC: ${new Date().toLocaleTimeString()} ◈ ${teams.length} TEAMS ◈ RANKED BY SCORE ◈`;
}

function buildInfoCards(sm,pm){
  const groups=[
    {color:'tank', emoji:'🪖', name:'Tank',  stockKey:'TANK', vehicleKey:'Tanks',     classes:['tank1','tank2','tank3']},
    {color:'navy', emoji:'⚓', name:'Navy',  stockKey:'NAVY', vehicleKey:'NavySeals', classes:['navy1','navy2','navy3']},
    {color:'air',  emoji:'✈',  name:'Air',   stockKey:'AIR',  vehicleKey:'AirForce',  classes:['air1', 'air2', 'air3']},
  ];

  const cards=groups.flatMap(({color,emoji,name,stockKey,vehicleKey,classes})=>{
    const stockPrice=sm[stockKey]?.price??'—';
    const ch=sm[stockKey]?.change||0;
    const vPrice=pm[vehicleKey]?.price??'—';
    const vPts=pm[vehicleKey]?.points??'—';
    const chStr=ch>0?`▲ +${ch}`:ch<0?`▼ ${ch}`:'';
    const chColor=ch>0?'#34D399':ch<0?'#F87171':'#94A3B8';
    return[
      `<div class="icard ${classes[0]}">
        <div class="icard-emoji">${emoji}</div>
        <div class="icard-label">${name} Stock</div>
        <div class="icard-val">${stockPrice}</div>
        ${ch!==0?`<div class="icard-sub" style="color:${chColor}">${chStr}</div>`:'<div class="icard-sub" style="color:#94A3B8">▶ 0</div>'}
      </div>`,
      `<div class="icard ${classes[1]}">
        <div class="icard-emoji">${emoji}</div>
        <div class="icard-label">${name} Cost</div>
        <div class="icard-val">${vPrice}</div>
        <div class="icard-sub" style="color:#F1F5F9">capital / unit</div>
      </div>`,
      `<div class="icard ${classes[2]}">
        <div class="icard-emoji">${emoji}</div>
        <div class="icard-label">${name} Points</div>
        <div class="icard-val">${vPts}</div>
        <div class="icard-sub" style="color:#F1F5F9">pts / unit</div>
      </div>`,
    ];
  });

  return`<div class="slbl">MARKET & VEHICLE REFERENCE</div><div class="info-grid">${cards.join('')}</div>`;
}

function buildAll(teams,sm,pm){
  return buildInfoCards(sm,pm)+`<div class="slbl">TEAM STANDINGS — RANKED BY SCORE</div><div class="tgrid">${teams.map((t,i)=>card(t,i,pm,sm)).join('')}</div>`;
}

function card(team,idx,pm,sm){
  const c=COLORS[idx%COLORS.length];
  const rankLabel=idx===0?'👑 #1':idx===1?'🥈 #2':idx===2?'🥉 #3':'#'+(idx+1);
  const rankClass=idx===0?'r1':idx===1?'r2':idx===2?'r3':'';
  const bonus=team._bonus||0;
  const wealthPct=Math.min(100,(team._wealth/600)*100);

  const vb=Object.entries(VC).map(([vk,vc])=>{
    const owned=parseInt(team[vk])||0;
    const dead=parseInt(team[vc.destroyedKey])||0;
    const alive=Math.max(0,owned-dead);
    const pts=pm[vk]?.points||0;
    return{vc,owned,dead,alive,pts,sub:alive*pts,wiped:owned>0&&alive===0};
  });

  const vhml=vb.map(({vc,alive,wiped})=>`
    <div class="vtile ${vc.c} ${wiped?'wiped':''}">
      <div class="vemo">${vc.e}</div>
      <div class="vtag">${vc.t}</div>
      <div class="valive">${alive}</div>
    </div>`).join('');

  const stockPortfolio=[
    {e:'🪖',lbl:'Tank Stock', n:team._tankS, color:'#94A3B8'},
    {e:'⚓',lbl:'Navy Stock', n:team._navyS, color:'#7DD3FC'},
    {e:'✈', lbl:'Air Stock',  n:team._airS,  color:'#C9A84C'},
  ].map(({e,lbl,n,color})=>`
    <div class="stock-row">
      <span class="sr-label" style="color:${color}">${e} ${lbl}</span>
      <span class="sr-val" style="color:#F1F5F9;font-weight:600">${n}</span>
    </div>`).join('');

  return`<div class="tcard ${rankClass}" style="--tc:${c.h};--tcr:${c.r};">
    <div class="stripe"></div>
    <div class="chead">
      <div><div class="crank ${idx===0?'gold':''}">${rankLabel}</div><div class="cname">${team['TeamName']||'?'}</div></div>
      <div class="score-box"><div class="score-lbl">SCORE</div><div class="score-val">${team._score}<span class="score-unit">PTS</span></div></div>
    </div>
    <div class="cbody">
      <div class="wealth-section">
        <div class="wealth-top">
          <div class="wealth-lbl">◈ TOTAL WEALTH</div>
          <div class="wealth-val">${team._wealth}</div>
        </div>
        <div class="wealth-bar"><div class="wealth-fill" style="width:${wealthPct}%"></div></div>
        <div class="wealth-breakdown">
          <div class="wb-row">
            <span class="wb-lbl">💧 Liquid Capital</span>
            <span class="wb-num">${team._liquid}</span>
          </div>
          <div class="wb-divider"></div>
          ${stockPortfolio}
        </div>
      </div>
      ${bonus>0?`<div class="bonus-row"><div class="bonus-lbl">⚔ BATTLE BONUS</div><div class="bonus-val">+${bonus}</div></div>`:''}
      <div class="vlbl">◈ VEHICLES</div>
      <div class="vrow">${vhml}</div>
    </div>
  </div>`;
}

function updTicker(teams,sm){
  const parts=[];
  ['TANK','NAVY','AIR'].forEach(k=>{
    const d=sm[k]||{price:0,change:0};const ch=d.change;
    parts.push(`<span class="ti"><span class="lb">${k} Stock</span><span class="vl ${ch>0?'tup':ch<0?'tdn':'tfl'}">${d.price} ${ch>0?'▲+'+ch:ch<0?'▼'+ch:'—'}</span></span>`);
  });
  parts.push('<span class="ti" style="opacity:.15;margin:0 12px">◈</span>');
  teams.forEach((t,i)=>{parts.push(`<span class="ti"><span class="lb">#${i+1} ${t['TeamName']}:</span><span class="vl" style="color:#F1F5F9">${t._score} PTS</span></span>`);});
  const tr=document.getElementById('ttrack');
  if(tr)tr.innerHTML=[...parts,...parts].join('');
}

function showErr(msg){
  document.getElementById('loader').style.display='none';
  const m=document.getElementById('mainArea');
  if(!document.getElementById('eb'))
    m.insertAdjacentHTML('afterbegin',`<div class="errbox" id="eb"><div style="font-size:30px;margin-bottom:8px">⚠</div><strong style="color:#F87171;font-family:'Bebas Neue',cursive;font-size:18px">DATA FEED ERROR</strong><div class="errm" id="em">${msg}</div><div class="errm" style="margin-top:6px;opacity:.5">Check: sheet is public · tabs: Teams, Stocks, Prices</div></div>`);
  else document.getElementById('em').textContent=msg;
}

go();
startCountdown();
</script>
</body>
</html>
